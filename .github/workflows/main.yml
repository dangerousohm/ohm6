name: Auto 50 Files Commits

on:
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create 50 Files and Commits
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          for i in {1..50}; do
            # สร้างไฟล์ใหม่ชื่อ test_1.txt ถึง test_50.txt
            echo "This is file number $i" > test_$i.txt
            git add test_$i.txt
            git commit -m "Add file test_$i.txt"
          done
          git push origin HEAD
